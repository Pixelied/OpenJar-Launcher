<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>OpenJar Launcher — GitHub Repo</title>
    <meta name="description" content="OpenJar Launcher — Mac-first Minecraft launcher / creator studio built with Tauri (Rust) + React. View the GitHub repository and README." />
    <link rel="canonical" href="https://github.com/Pixelied/OpenJar-Launcher" />
    <meta name="robots" content="index,follow" />

    <meta property="og:title" content="OpenJar Launcher — GitHub Repo" />
    <meta property="og:description" content="Mac-first Minecraft launcher / creator studio built with Tauri (Rust) + React." />
    <meta property="og:url" content="https://pixelied.github.io/OpenJar-Launcher/" />
    <meta property="og:type" content="website" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.6.1/github-markdown.min.css"
      referrerpolicy="no-referrer"
    />

    <style>
      :root{
        --bg:#f6f8fa;
        --bg2:#ffffff;
        --card:#ffffff;
        --border:#d0d7de;
        --text:#1f2328;
        --muted:rgba(31,35,40,.72);
        --link:#0969da;
        --shadow:0 18px 40px rgba(31,35,40,.12);
        --soft:rgba(27,31,36,.06);
        --soft2:rgba(27,31,36,.10);
        --btn:#0969da;
        --btnText:#fff;
        --btn2:rgba(27,31,36,.06);
        --ring:rgba(9,105,218,.25);
      }
      html[data-theme="dark"]{
        --bg:#0d1117;
        --bg2:#0b0f14;
        --card:#161b22;
        --border:rgba(240,246,252,.14);
        --text:#e6edf3;
        --muted:rgba(230,237,243,.70);
        --link:#79c0ff;
        --shadow:0 18px 40px rgba(0,0,0,.45);
        --soft:rgba(255,255,255,.08);
        --soft2:rgba(255,255,255,.12);
        --btn:rgba(121,192,255,.22);
        --btnText:#e6edf3;
        --btn2:rgba(255,255,255,.06);
        --ring:rgba(121,192,255,.25);
      }

      *{box-sizing:border-box}
      body{
        margin:0;
        font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
        background:
          radial-gradient(1200px 650px at 18% 0%, var(--soft) 0%, transparent 55%),
          radial-gradient(1200px 650px at 80% 0%, var(--soft) 0%, transparent 60%),
          linear-gradient(180deg, var(--bg2), var(--bg));
        color:var(--text);
        min-height:100vh;
      }
      .wrap{max-width:980px;margin:0 auto;padding:28px 16px 60px;}
      .card{
        background:var(--card);
        border:1px solid var(--border);
        border-radius:18px;
        box-shadow:var(--shadow);
        overflow:hidden;
      }

      .topbar{
        display:grid;
        grid-template-columns: 1fr auto;
        gap:14px;
        padding:14px 16px;
        border-bottom:1px solid var(--border);
        background:linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,0));
        align-items:center;
      }
      html[data-theme="dark"] .topbar{
        background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,0));
      }

      .left{
        display:flex;
        align-items:center;
        gap:14px;
        min-width:0;
      }
      .logo{width:22px;height:22px;flex:0 0 22px;}
      .titleblock{min-width:0;display:flex;flex-direction:column;gap:2px}
      .kicker{font-size:12px;color:var(--muted);font-weight:800;letter-spacing:.2px}
      .repo a{color:var(--link);text-decoration:none;font-weight:900;font-size:15px}
      .repo a:hover{text-decoration:underline}

      .actions{
        display:flex;
        gap:10px;
        align-items:center;
        flex-wrap:wrap;
        justify-content:flex-end;
      }

      .btn{
        display:inline-flex;align-items:center;justify-content:center;
        height:36px;
        padding:0 12px;
        border-radius:12px;
        border:1px solid transparent;
        background:var(--btn);color:var(--btnText);
        font-weight:900;text-decoration:none;cursor:pointer;user-select:none;
        transition:transform .08s ease, filter .15s ease, box-shadow .15s ease;
        white-space:nowrap;
      }
      .btn:active{transform:translateY(1px)}
      .btn:hover{filter:brightness(1.02)}
      .btn:focus{outline:none; box-shadow:0 0 0 4px var(--ring);}

      html[data-theme="light"] .btn{border-color:rgba(9,105,218,.25)}
      html[data-theme="dark"]  .btn{border-color:rgba(121,192,255,.25)}

      .btn.secondary{
        background:var(--btn2);
        color:var(--text);
        border:1px solid var(--border);
        font-weight:800;
      }

      .pill{
        height:36px;
        display:inline-flex;align-items:center;
        font-size:12px;color:var(--muted);
        padding:0 10px;border:1px solid var(--border);
        border-radius:999px;background:var(--soft);
        white-space:nowrap;
      }

      .themeToggle{
        position:relative;
        width:54px;height:36px;
        border-radius:999px;
        border:1px solid var(--border);
        background:var(--btn2);
        cursor:pointer;
        transition:background .15s ease, border-color .15s ease, transform .08s ease, box-shadow .15s ease;
      }
      .themeToggle:active{transform:translateY(1px)}
      .themeToggle:focus{outline:none; box-shadow:0 0 0 4px var(--ring);}
      .themeKnob{
        position:absolute;
        top: 50%;left:4px;
        width:28px;height:28px;
        border-radius:999px;
        background:linear-gradient(180deg, rgba(255,255,255,.9), rgba(255,255,255,.65));
        border:1px solid var(--border);
        box-shadow:0 10px 22px rgba(0,0,0,.10);
        transition:transform .18s ease, background .15s ease;
       transform: translateY(-50%);}
      html[data-theme="dark"] .themeToggle{background:var(--soft2)}
      html[data-theme="dark"] .themeKnob{
        transform: translate(18px, -50%);
        background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.10));
      }

      .content{padding:16px}
      .markdown-wrap{
        border:1px solid var(--border);
        border-radius:14px;
        padding:16px;
        overflow:hidden;
        background:transparent;
      }
      .markdown-body{background:transparent !important;color:var(--text) !important;}
      .markdown-body a{color:var(--link) !important;}
      .markdown-body pre,.markdown-body code{background:var(--btn2) !important;}
      .markdown-body table th,.markdown-body table td{border-color:var(--border) !important;}

      .markdown-body img{
        max-width:100%;
        border-radius:12px;
        border:1px solid var(--border);
        background:var(--card);
        box-shadow:0 10px 22px rgba(0,0,0,.08);
      }

      .loading{color:var(--muted);font-size:14px}
      .footer{margin-top:12px;color:var(--muted);font-size:12px}
      code{background:var(--btn2);padding:2px 6px;border-radius:8px;border:1px solid var(--border)}
      .hide{display:none !important}

      @media (max-width: 760px){
        .topbar{grid-template-columns: 1fr; gap:10px}
        .actions{justify-content:flex-start}
        .pill{display:none}
      }
    

/* Anchor targeting (TOC) */
h1, h2, h3, h4, h5, h6 { scroll-margin-top: 112px; }
h1:target, h2:target, h3:target, h4:target, h5:target, h6:target {
  outline: 2px solid var(--accent-200);
  outline-offset: 6px;
  border-radius: 14px;
}

/* Floating Back-to-top */
.fab-top{
  position: fixed;
  right: 18px;
  bottom: 18px;
  padding: 10px 12px;
  border-radius: 999px;
  border: 1px solid var(--card-border);
  background: var(--card);
  color: var(--text);
  box-shadow: var(--shadow);
  cursor: pointer;
  font-weight: 650;
  letter-spacing: .2px;
  opacity: 0;
  transform: translateY(12px);
  pointer-events: none;
  transition: opacity .18s ease, transform .18s ease, background .18s ease;
}
.fab-top.show{
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.fab-top:hover{
  background: var(--card-2);
}
.fab-top:active{
  transform: translateY(1px);
}

</style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js" referrerpolicy="no-referrer"></script>

    <script>
      /******************************************************************
       * QUICK TOGGLES
       ******************************************************************/
      const REDIRECT = false;             // <-- change this ONE WORD to false
      const REDIRECT_GRACE_MS = 250;     // 0 = truly instant (button won't be clickable)
      const SMOOTH_SCROLL = true;

      const REPO = {
        owner: "Pixelied",
        name: "OpenJar-Launcher",
        branch: "main",
        github: "https://github.com/Pixelied/OpenJar-Launcher",
        rawBase: "https://raw.githubusercontent.com/Pixelied/OpenJar-Launcher/main/",
        readmeRaw: "https://raw.githubusercontent.com/Pixelied/OpenJar-Launcher/main/README.md",
        defaultTheme: "light"
      };

      // Theme: default light, remember user choice
      const savedTheme = localStorage.getItem("oj_theme");
      document.documentElement.setAttribute("data-theme", savedTheme || REPO.defaultTheme);

      const statePill = document.getElementById("statePill");
      const openBtn = document.getElementById("openBtn");
      const repoLink = document.getElementById("repoLink");
      const stayBtn = document.getElementById("stayBtn");

      openBtn.href = REPO.github;
      repoLink.href = REPO.github;

      function isStay() {
        return (new URLSearchParams(location.search).get("stay") === "1");
      }

      function setStayUI(mode) {
        const stay = isStay();
        stayBtn.textContent = stay ? "Enable redirect" : "Stay on this page";

        if (!REDIRECT) {
          statePill.textContent = "Redirect disabled (code)";
          return;
        }
        if (mode === "pendingRedirect") {
          statePill.textContent = "Redirecting… (tap Stay)";
          return;
        }
        statePill.textContent = stay ? "Redirect paused (stay=1)" : "Not redirecting";
      }

      // Stay button: URL param only (NOT persistent)
      let redirectTimer = null;
      function cancelRedirectTimer() {
        if (redirectTimer) {
          clearTimeout(redirectTimer);
          redirectTimer = null;
        }
      }

      stayBtn.addEventListener("click", () => {
        cancelRedirectTimer();

        const url = new URL(location.href);
        const stay = url.searchParams.get("stay") === "1";

        if (!stay) {
          url.searchParams.set("stay", "1");
          history.replaceState(null, "", url.toString());
          setStayUI();
          window.scrollTo({ top: 0, behavior: "smooth" });
        } else {
          url.searchParams.delete("stay");
          history.replaceState(null, "", url.toString());
          if (REDIRECT) window.location.replace(REPO.github);
          else setStayUI();
        }
      });

      // Theme toggle
      document.getElementById("themeBtn").addEventListener("click", () => {
        const current = document.documentElement.getAttribute("data-theme") || "light";
        const next = current === "light" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("oj_theme", next);
      });

      // Redirect: scheduled after handlers exist, with a tiny grace window
      const canRedirectNow = REDIRECT && !isStay();
      if (canRedirectNow) {
        setStayUI("pendingRedirect");
        redirectTimer = setTimeout(() => {
          window.location.replace(REPO.github);
        }, Math.max(0, REDIRECT_GRACE_MS));
      } else {
        setStayUI();
      }

      function isAbsoluteUrl(u) {
        return /^https?:\/\//i.test(u) || u.startsWith("data:") || u.startsWith("blob:") || u.startsWith("//");
      }

      function normalizeRel(p) {
  if (!p) return p;
  return p
    .replace(/^\.\//, "")
    .replace(/^\//, "")
    // Guard against accidental leading "d/" in some README links (typo-safe)
    .replace(/^d\/(?=readme-assets\/)/, "");
}

function isImagePath(p) {
        return /\.(png|jpe?g|gif|webp|svg)$/i.test(p.split("?")[0].split("#")[0]);
      }

      // Convert github.com/.../raw/... -> raw.githubusercontent.com/.../... (more reliable hotlink)
      function toRawGithub(url) {
        const m = url.match(/^https?:\/\/github\.com\/([^\/]+)\/([^\/]+)\/raw\/([^\/]+)\/(.+)$/i);
        if (!m) return url;
        const owner = m[1], repo = m[2], branch = m[3], path = m[4];
        return `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${path}`;
      }

      function absolutizeUrl(url, type) {
        if (!url) return url;
        if (url.startsWith("#") || url.startsWith("mailto:") || isAbsoluteUrl(url)) return url;

        const clean = normalizeRel(url);
        const encoded = encodeURI(clean);

        if (type === "image") return REPO.rawBase + encoded;
        // For plain links to images, better to go to GitHub blob (or raw) — we handle later
        return REPO.github + "/blob/" + REPO.branch + "/" + encoded;
      }

      // GitHub-like slugger for headings (TOC links in README usually use this)
      function makeGitHubSlugger() {
  const seen = new Map();
  return function githubSlug(text) {
    let slug = (text || "")
      .toLowerCase()
      .trim()
      // remove punctuation (matches GitHub-ish behavior closely)
      .replace(/[\u2000-\u206F\u2E00-\u2E7F'".,!?():;\[\]{}<>@#$%^&*+=|\\/`~]/g, "")
      // replace EACH whitespace char with '-' (do not collapse)
      .replace(/\s/g, "-")
      // trim leading/trailing hyphens
      .replace(/^-+|-+$/g, "");

    // dedupe like GitHub: "heading", "heading-1", ...
    const count = seen.get(slug) || 0;
    seen.set(slug, count + 1);
    if (count > 0) slug = slug + "-" + count;
    return slug || "section";
  };
}


// Marked renderer: still useful, but we'll post-process HTML too (for raw HTML <img>)
      const renderer = new marked.Renderer();

      renderer.link = (href, title, text) => {
        href = href || "";
        const isHash = href.startsWith("#");

        const finalHref = isHash ? href : absolutizeUrl(href, "link");
        const t = title ? ` title="${title.replace(/"/g, "&quot;")}"` : "";

        if (isHash) return `<a href="${finalHref}"${t}>${text}</a>`;
        return `<a href="${finalHref}" target="_blank" rel="noopener noreferrer"${t}>${text}</a>`;
      };

      renderer.image = (href, title, text) => {
        const src = absolutizeUrl(href || "", "image");
        const alt = (text || "").replace(/"/g, "&quot;");
        const t = title ? ` title="${title.replace(/"/g, "&quot;")}"` : "";
        return `<img src="${src}" alt="${alt}"${t} loading="lazy" decoding="async" referrerpolicy="no-referrer" />`;
      };

      marked.setOptions({ renderer, gfm: true, mangle: false, headerIds: false });

      function applyGithubHeadingIds(root) {
        const slug = makeGitHubSlugger();
        const headings = root.querySelectorAll("h1,h2,h3,h4,h5,h6");
        headings.forEach(h => {
          // Some headings contain links/icons — use textContent
          const text = (h.textContent || "").trim();
          const id = slug(text);
          h.id = id;
        });
      }

      function rewriteRelativeImagesAndLinks(root){
    // Convert README-relative links/images to stable URLs that work on GitHub Pages and when opened locally.
    const imgs = root.querySelectorAll("img");
    imgs.forEach(img => {
      const original = (img.getAttribute("src") || "").trim();
      if (!original) return;

      const isRelative =
        original.startsWith("./") ||
        original.startsWith("../") ||
        (!original.startsWith("http") && !original.startsWith("data:") && !original.startsWith("blob:") && !original.startsWith("#"));

      // Primary resolution
      let resolved = original;
      if (isRelative) {
        let clean = original.replace(/^(\.\/)+/, "").replace(/^\/+/, "");
        resolved = REPO.rawBase + "/" + encodeURI(clean);
      } else {
        resolved = toRawGithub(original);
      }
      img.setAttribute("src", resolved);

      // Fallback resolution (if README references old paths or the file lives elsewhere in repo)
      const clean0 = original.replace(/^(\.\/)+/, "").replace(/^\/+/, "");

      const altPaths = [];
      // Common historical /docs screenshots path → moved to readme-assets/images/
      if (clean0.startsWith("docs/screenshots/")) {
        altPaths.push("readme-assets/images/" + clean0.slice("docs/screenshots/".length));
      }
      // If it was referenced from /docs/ but lives at repo root, try stripping "docs/"
      if (clean0.startsWith("docs/")) {
        altPaths.push(clean0.slice("docs/".length));
      }
      // If it's *just* a filename or other folder, try the canonical screenshots folder
      const fileOnly = clean0.split("/").pop();
      if (fileOnly && !clean0.startsWith("readme-assets/images/")) {
        altPaths.push("readme-assets/images/" + fileOnly);
      }

      const altUrls = Array.from(new Set(
        altPaths
          .filter(Boolean)
          .map(p => REPO.rawBase + "/" + encodeURI(p.replace(/^\/+/, "")))
          .filter(u => u !== resolved)
      ));

      if (altUrls.length) {
        img.dataset.ojRetryUrls = JSON.stringify(altUrls);
        img.dataset.ojRetryIndex = "0";
        img.addEventListener("error", () => {
          try{
            const urls = JSON.parse(img.dataset.ojRetryUrls || "[]");
            const i = parseInt(img.dataset.ojRetryIndex || "0", 10);
            if (!Number.isFinite(i) || i >= urls.length) return;
            img.dataset.ojRetryIndex = String(i + 1);
            img.setAttribute("src", urls[i]);
          }catch(_e){}
        }, { passive: true });
      }
    });

    const links = root.querySelectorAll("a[href]");
    links.forEach(a => {
      const href = (a.getAttribute("href") || "").trim();
      if (!href) return;

      // leave hash links alone so TOC + headings work
      if (href.startsWith("#")) return;

      const isRelative =
        href.startsWith("./") ||
        href.startsWith("../") ||
        (!href.startsWith("http") && !href.startsWith("mailto:") && !href.startsWith("data:") && !href.startsWith("blob:"));

      if (isRelative) {
        let clean = href.replace(/^(\.\/)+/, "").replace(/^\/+/, "");
        a.setAttribute("href", REPO.rawBase + "/" + encodeURI(clean));
        a.setAttribute("target", "_blank");
        a.setAttribute("rel", "noopener noreferrer");
      } else {
        a.setAttribute("href", toRawGithub(href));
      }
    });
  }


      function setupTocAndAnchorScroll(readmeEl) {
  // Smooth-scroll internal anchors and update the URL hash without a jump.
  readmeEl.addEventListener("click", (e) => {
    const a = e.target.closest("a");
    if (!a) return;
    const href = a.getAttribute("href") || "";
    if (!href.startsWith("#")) return;

    const rawId = href.slice(1);
    const decoded = decodeURIComponent(rawId);

    const target = document.getElementById(decoded) || document.getElementById(rawId);
    if (!target) return;

    e.preventDefault();

    const nextUrl = location.pathname + location.search + "#" + encodeURIComponent(target.id);
    history.pushState(null, "", nextUrl);

    target.scrollIntoView({ behavior: SMOOTH_SCROLL ? "smooth" : "auto", block: "start" });
  });
}

function scrollToHashIfPresent() {
  const hash = location.hash || "";
  if (!hash.startsWith("#")) return;
  const rawId = hash.slice(1);
  const decoded = decodeURIComponent(rawId);
  const target = document.getElementById(decoded) || document.getElementById(rawId);
  if (!target) return;
  requestAnimationFrame(() => {
    target.scrollIntoView({ behavior: "auto", block: "start" });
  });
}

function setupBackToTop() {
  const btn = document.getElementById("backTop");
  if (!btn) return;

  const update = () => {
    const show = window.scrollY > 700;
    btn.classList.toggle("show", show);
  };

  window.addEventListener("scroll", update, { passive: true });
  update();

  btn.addEventListener("click", () => {
    history.replaceState(null, "", location.pathname + location.search);
    window.scrollTo({ top: 0, behavior: SMOOTH_SCROLL ? "smooth" : "auto" });
  });
}

async function loadReadme() {
        const loading = document.getElementById("loading");
        const readmeEl = document.getElementById("readme");

        try {
          const res = await fetch(REPO.readmeRaw, { cache: "no-store" });
          if (!res.ok) throw new Error("README fetch failed");
          const md = await res.text();

          // Parse markdown (keeps raw HTML blocks intact)
          readmeEl.innerHTML = marked.parse(md);

          // Post-process:
          // 1) Apply GitHub-style heading IDs so TOC works
          applyGithubHeadingIds(readmeEl);

          // 2) Rewrite any relative <img> / <a> that came from raw HTML in README
          rewriteRelativeImagesAndLinks(readmeEl);

          // 3) Anchor scrolling for TOC
          setupTocAndAnchorScroll(readmeEl);
          setupBackToTop();
          scrollToHashIfPresent();

          loading.classList.add("hide");
          readmeEl.style.display = "block";
        } catch (e) {
          loading.innerHTML =
            `Couldn't load README preview here. <a href="${REPO.github}" target="_blank" rel="noopener noreferrer">Open on GitHub</a>.`;
        }
      }

      loadReadme();
    </script>
    <button id="backTop" class="fab-top" type="button" aria-label="Back to top">Top</button>
</body>
</html>
